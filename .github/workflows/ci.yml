name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:
  schedule: [cron: "0 1 */7 * *"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --tests -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features --features alloc -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features --features heapless -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features --features deflate -- -D warnings

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc with docsrs cfg
        env:
          RUSTDOCFLAGS: --cfg docsrs -Dwarnings
        run: cargo doc --workspace --all-features --no-deps

  hack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - run: cargo hack build -p websocket-proto --each-feature
      - run: cargo hack test -p websocket-proto --each-feature

  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p websocket-proto --all-features

  no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf, wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p websocket-proto --no-default-features --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features heapless --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features alloc --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features alloc,deflate --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features alloc --target wasm32-unknown-unknown

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - run: cargo miri setup
      - run: cargo miri test -p websocket-proto --all-features
        env:
          # proptest under miri is orders of magnitude slower; a handful of
          # cases per property keeps the job in minutes while still running
          # every test through the interpreter.
          PROPTEST_CASES: 8

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            websocket-proto/fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Fuzz frame_decode (bounded smoke)
        working-directory: websocket-proto
        run: cargo fuzz run frame_decode -- -runs=100000 -max_total_time=120

# There is deliberately NO release-symbol panic scan: on current toolchains a
# `pub fn` containing a guaranteed panic emits no symbols into the rlib at all
# (verified empirically — uninstantiated library code ships as metadata, with
# codegen deferred to downstream binaries), and `cargo bloat` cannot read
# rlib-only crates, so symbol-grepping either artifact is silently blind.
# Panic-freedom is instead enforced by the clippy lint wall above and verified
# by `no-panic`-decorated tests landing with the conformance/hardening cycle,
# which act at final-binary link time where codegen actually happens.
