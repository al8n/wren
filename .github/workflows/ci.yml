name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:
  schedule: [cron: "0 1 */7 * *"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --tests -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features --features alloc -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features --features heapless -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features --features deflate -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features --features no-atomic -- -D warnings

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc with docsrs cfg
        env:
          RUSTDOCFLAGS: --cfg docsrs -Dwarnings
        run: cargo doc --workspace --all-features --no-deps

  hack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - run: cargo hack build -p websocket-proto --each-feature
      - run: cargo hack test -p websocket-proto --each-feature

  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p websocket-proto --all-features

  no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf, thumbv6m-none-eabi, wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p websocket-proto --no-default-features --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features heapless --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features alloc --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features alloc,deflate --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features alloc --target wasm32-unknown-unknown
      # No-atomic bare-metal tier: Cortex-M0+ / thumbv6m-none-eabi (RP2040) has
      # NO native atomic CAS, so the default atomic tier — smol_str's `Arc`,
      # bytes' atomic refcount — cannot build there. The `no-atomic` feature
      # swaps the refcounted text / binary buffers onto `portable_atomic_util::Arc`
      # (CAS via a `critical-section` impl the final binary provides). thumbv7em
      # above HAS atomics, so it does not exercise this path. `no-atomic` +
      # `heapless` is additive; `no-atomic` outranks `heapless` and must resolve
      # cleanly (no duplicate storage types).
      - run: cargo check -p websocket-proto --no-default-features --features no-atomic --target thumbv6m-none-eabi
      - run: cargo check -p websocket-proto --no-default-features --features no-atomic,heapless --target thumbv6m-none-eabi

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - run: cargo miri setup
      - run: cargo miri test -p websocket-proto --all-features
        env:
          # proptest under miri is orders of magnitude slower; a handful of
          # cases per property keeps the job in minutes while still running
          # every test through the interpreter.
          PROPTEST_CASES: 8

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            websocket-proto/fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Fuzz all targets (bounded smoke)
        working-directory: websocket-proto
        run: |
          for target in $(cargo fuzz list); do
            cargo fuzz run "$target" -- -runs=100000 -max_total_time=120
          done

  # Panic-freedom is enforced statically by the clippy lint wall above; this job
  # adds the link-time half. `no-panic` proves the core leaf primitives compile
  # to panic-free code by failing the LINK if a panic path survives, so it MUST
  # run in release (the optimizer has to prune dead panic branches first; in
  # debug the check is disabled and would false-positive).
  #
  # There is deliberately NO release-symbol panic *scan*: on current toolchains
  # a `pub fn` with a guaranteed panic emits no symbols into the rlib at all
  # (codegen is deferred to downstream binaries) and `cargo bloat` cannot read
  # rlib-only crates, so symbol-grepping either artifact is silently blind. The
  # `no-panic` link test acts at final-binary link time where codegen happens.
  no-panic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: no-panic link-time verification (release)
        run: cargo test -p websocket-proto --release --features test-no-panic --test no_panic
