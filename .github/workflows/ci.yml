name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:
  schedule: [cron: "0 1 */7 * *"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Fail if the committed QPACK tables drift from xtask/src/qpack_data.rs.
      - run: cargo run -p xtask -- qpack-codegen --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --tests --examples -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features --features alloc -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features --features deflate -- -D warnings
      - run: cargo clippy -p websocket-proto --no-default-features --features no-atomic -- -D warnings
      - run: cargo clippy -p http3-proto --no-default-features -- -D warnings
      - run: cargo clippy -p http3-proto --no-default-features --features alloc -- -D warnings

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc with docsrs cfg
        env:
          RUSTDOCFLAGS: --cfg docsrs -Dwarnings
        run: cargo doc --workspace --all-features --no-deps

  hack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - run: cargo hack build -p websocket-proto --each-feature
      - run: cargo hack test -p websocket-proto --each-feature
      - run: cargo hack build -p http3-proto --each-feature
      - run: cargo hack test -p http3-proto --each-feature
      - run: cargo hack test -p wren-trace --each-feature
      # Powerset (8 combos over tls/deflate/tracing): feature-interaction
      # bugs (tls+deflate) escape an each-feature pass.
      - run: cargo hack test -p wren-compio --feature-powerset
      # wren-reactor: build-only powerset (the runtime axis tokio/smol plus
      # tls/deflate/tracing) — the socket tests run --all-features in `test`.
      - run: cargo hack build -p wren-reactor --feature-powerset --no-dev-deps

  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p websocket-proto --all-features
      - run: cargo test -p http3-proto --all-features
      - run: cargo test -p wren-trace --all-features
      - run: cargo test -p wren-compio --all-features
      - run: cargo test -p wren-reactor --all-features

  no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf, thumbv6m-none-eabi, wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p websocket-proto --no-default-features --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features alloc --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features alloc,deflate --target thumbv7em-none-eabihf
      - run: cargo check -p websocket-proto --no-default-features --features alloc --target wasm32-unknown-unknown
      # No-atomic bare-metal tier: Cortex-M0+ / thumbv6m-none-eabi (RP2040) has
      # NO native atomic CAS, so the default atomic tier — smol_str's `Arc`,
      # bytes' atomic refcount — cannot build there. The `no-atomic` feature
      # swaps the refcounted text / binary buffers onto `portable_atomic_util::Arc`
      # (CAS via a `critical-section` impl the final binary provides). thumbv7em
      # above HAS atomics, so it does not exercise this path.
      - run: cargo check -p websocket-proto --no-default-features --features no-atomic --target thumbv6m-none-eabi
      # MUST-FAIL: `no-atomic` + `deflate` (without std) is a contradictory
      # combo — deflate's `alloc` dependency drags the atomic-CAS backends in,
      # defeating the tier. lib.rs raises a compile_error!; pin that it fires.
      - run: "! cargo check -p websocket-proto --no-default-features --features no-atomic,deflate 2>/dev/null"
      # http3-proto bare tier: no std, no alloc — varint/frame/QPACK codecs and
      # the Connection state machine must compile without any allocator.
      - run: cargo check -p http3-proto --no-default-features --target thumbv7em-none-eabihf
      - run: cargo check -p http3-proto --no-default-features --target thumbv6m-none-eabi
      - run: cargo check -p http3-proto --no-default-features --features alloc --target thumbv7em-none-eabihf
      - run: cargo check -p http3-proto --no-default-features --features alloc --target wasm32-unknown-unknown
      # Run the bare-tier smoke test on the host (x86_64) to confirm it executes
      # without panics (cross-compiled targets cannot run tests in CI without QEMU).
      - run: cargo test -p http3-proto --no-default-features --test tiers

  # Proto only: the driver crates do real socket IO, which miri cannot
  # interpret (and their unsafe surface is empty regardless).
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - run: cargo miri setup
      - run: cargo miri test -p websocket-proto --all-features
        env:
          # proptest under miri is orders of magnitude slower; a handful of
          # cases per property keeps the job in minutes while still running
          # every test through the interpreter.
          PROPTEST_CASES: 8
          # proptest's failure persistence reads/writes regression files
          # (committed in-tree), which needs `getcwd` + file IO — host
          # syscalls miri's isolation rejects. Disabling isolation permits
          # them; UB detection is unaffected.
          MIRIFLAGS: -Zmiri-disable-isolation
      - run: cargo miri test -p http3-proto --all-features
        env:
          PROPTEST_CASES: 8
          MIRIFLAGS: -Zmiri-disable-isolation

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            websocket-proto/fuzz
            http3-proto/fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Fuzz all targets — websocket-proto (bounded smoke)
        working-directory: websocket-proto
        # The target is pinned to gnu: recent cargo-fuzz defaults to musl on
        # Linux, where ASAN is incompatible with the statically linked libc
        # (and rustup has no musl std installed here).
        run: |
          for target in $(cargo fuzz list); do
            cargo fuzz run "$target" --target x86_64-unknown-linux-gnu -- -runs=100000 -max_total_time=120
          done
      - name: Fuzz all targets — http3-proto (bounded smoke)
        working-directory: http3-proto
        run: |
          for target in $(cargo fuzz list); do
            cargo fuzz run "$target" --target x86_64-unknown-linux-gnu -- -runs=100000 -max_total_time=120
          done

  # Panic-freedom is enforced statically by the clippy lint wall above; this job
  # adds the link-time half. `no-panic` proves the core leaf primitives compile
  # to panic-free code by failing the LINK if a panic path survives, so it MUST
  # run in release (the optimizer has to prune dead panic branches first; in
  # debug the check is disabled and would false-positive).
  #
  # There is deliberately NO release-symbol panic *scan*: on current toolchains
  # a `pub fn` with a guaranteed panic emits no symbols into the rlib at all
  # (codegen is deferred to downstream binaries) and `cargo bloat` cannot read
  # rlib-only crates, so symbol-grepping either artifact is silently blind. The
  # `no-panic` link test acts at final-binary link time where codegen happens.
  no-panic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: no-panic link-time verification (release)
        run: |
          cargo test -p websocket-proto --release --features test-no-panic --test no_panic
          cargo test -p http3-proto --release --features test-no-panic --test no_panic
